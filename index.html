<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mobile.css">

</head>
<body>
    <main>
        <div id="visual">
            <h1 id="titulo">Faça login para entrar <br> na nossa página</h1>
            <img src="img/undraw_authentication_1evl.svg" alt="svg">
        </div>
            
            

                
                
              <form id="login-box" method="post">
                  <h1 id="titulo-box">LOGIN</h1>
                   <div id="entrada">
                       <div>
                           <label class="sub" for="usuario">Usuário</label>
                           <p><input type="email" name="mail" id="usuario" placeholder="Usuário@email" required></p>
                       </div>
                       <div>
                           <label class="sub" for="senha">Senha</label>
                           <p><input type="password" name="senha" id="senha" placeholder="Senha" required></p>
                       </div>
                   </div>
                   <p  id="saida"></p>
                   <div id="box">
                       <p id="lembrar">
                           <input type="checkbox" name="checkbox" id="checkbox"> <label for="checkbox">lembre-se de mim</label>
                       </p>
                       <p id="esqueci" onclick="alert('Recuperação de senha')">
                           Esqueceu a senha
                       </p>
                   </div>
                   <div id="buttom">
                       <input id="butao" type="button" value="LOGIN" onclick="login()">
                   </div>
              </form>

            
        
      </main>

      <script src="script/script.js"></script>
</body>
</html>
